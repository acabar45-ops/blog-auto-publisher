name: Daily Blog Publish

on:
  schedule:
    # 월~금 09:00 KST = 00:00 UTC (한국이 UTC+9)
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 수동 실행 허용

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run publisher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PW: ${{ secrets.WP_APP_PW }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_SHEET_WORKSHEET: keywords
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          SOLAPI_API_KEY: ${{ secrets.SOLAPI_API_KEY }}
          SOLAPI_API_SECRET: ${{ secrets.SOLAPI_API_SECRET }}
          SOLAPI_SENDER: ${{ secrets.SOLAPI_SENDER }}
          NOTIFY_PHONE: ${{ secrets.NOTIFY_PHONE }}
          DRY_RUN: 'false'
        run: python publish.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json
